<body>
    <header>

        <nav>

                <li><a href="#">Locales</a></li>
            </ul>
        </nav>

    <main>
        <h1>Locales</h1>
        <!-- Cuerpo principal, tema -->

        <iframe width="560" height="315" src="https://www.youtube.com/embed/mnl3kbo-S4M?si=ifK9radbhG7j8_FW" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/V9xtQsL89ws?si=IND-VOibGLom5jJ3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3284.718202139445!2d-58.43477722514766!3d-34.5859962565609!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcc945173b3dd7%3A0xe8a347bb55df550c!2sCoderhouse!5e0!3m2!1ses-419!2sar!4v1774715747023!5m2!1ses-419!2sar" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>


         <!-- ------------------ FORM -->
    <form action=""> <!--url a donde se envia el form-->
        <!-- Ingreso de texto -->
        <label for="nombre">Nombre</label> <!--Define formalmente el elemento -->
        <input type="text" name="" id="nombre" required placeholder="Macarena Rodriguez">
        
        <label for="correo">Ingrese su correo</label>
        <input type="email" name="" id="correo" placeholder="ejemplo@mail.com" >
        
        <label for="tel">Integrar telefono</label>
        <input type="number" name="" id="tel">
        
        <textarea name="" id="" cols="30" rows="10"></textarea>

        <!-- controles de seleccion:  Value dato elegido -->
            <!-- radio:solo 1 -->
            <p>acepta términos y condiciones</p>
            <label for="si">si</label>
            <input type="radio" name="terminos" id="si" >
            <label for="no">no</label>
            <input type="radio" name="terminos" id="no">
          
            <!-- check: 1 o + -->
            <p>Seleciones turno de preferencia</p>
            <label for="dia">Día</label>
            <input type="checkbox" name="turno" id="dia" >
            <label for="noche">Noche</label>
            <input type="checkbox" name="turno" id="noche">


            <!-- menu desplegable -->
            <p>Talle de campera</p>
            <select name="talles">
                <option value="L">Large</option>
                <option value="M">Medium</option>
                <option value="S">Small</option>
            </select>

            <!-- <fieldset> y <legend> -->
            <fieldset>
                <legend>Talle de remera</legend>
                <select name="talles">
                    <option value="L">Large</option>
                    <option value="M">Medium</option>
                    <option value="S">Small</option>
                  </select>
              </fieldset>
    
        <!-- Botones -->
        <input type="submit" value="Enviar formulario"/>
        <input type="reset" value="Limpiar formulario"/>
        
    </form>


    </main>
    <footer>
        <!-- Pie de pagina, cierra -->
    </footer>
</body>
</html>
